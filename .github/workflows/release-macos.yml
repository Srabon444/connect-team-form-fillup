name: Release macOS

on:
  push:
    tags:
      - "macos-v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Run tests
        working-directory: desktop
        run: npm test

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Team Timesheet ${{ github.ref_name }} (macOS)"
          releaseBody: |
            macOS build: .dmg attached (unsigned — no Apple Developer certificate).

            First launch: right-click the app → Open → Open, or run
            `xattr -dr com.apple.quarantine "/Applications/Team Timesheet.app"`
            to clear Gatekeeper's quarantine flag.
          releaseDraft: false
          prerelease: false
