name: Release Android

# Fully automated: any push to this branch that touches desktop/ builds a
# debug APK (installable via "unknown sources") and publishes it, keeping
# only the latest android-v* release. Tauri's Android project is generated
# on the runner (`tauri android init`) — it's gitignored, not committed.
#
# NOTE: Android auto-fill isn't supported (Tauri mobile is single-window, so
# the in-app Fillout window can't run). On Android, Final Submit opens the
# form in the device browser for manual entry.
on:
  push:
    branches: ["desktop-android"]
    paths: ["desktop/**", ".github/workflows/release-android.yml"]
  workflow_dispatch:

# Only build the latest push; cancel superseded runs so releases don't pile up.
concurrency:
  group: release-android
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      NDK_VERSION: "26.1.10909125"
      # Google Drive OAuth client secret, compiled in via option_env! in
      # gdrive.rs — kept out of source. This build uses a raw shell step
      # (not tauri-action like the other 3 OSes), so it needed its OWN
      # env wiring; that's why it silently compiled with an empty secret
      # ("client_secret is missing") even after the other OSes were fixed.
      GD_CLIENT_SECRET: ${{ secrets.GD_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Run tests
        working-directory: desktop
        run: npm test

      - name: Tool versions (diagnostic)
        working-directory: desktop
        run: |
          node -v; java -version; echo "NDK_HOME=$NDK_HOME"
          npx tauri -V || true

      - name: Build Android APK (debug, arm64)
        working-directory: desktop
        run: |
          set -eux
          npm run tauri android init -- --ci
          npm run tauri android build -- --debug --apk --target aarch64 --verbose

      - name: Locate APK
        id: apk
        run: |
          APK=$(find desktop/src-tauri/gen/android -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK found. Build output tree:"
            find desktop/src-tauri/gen/android -type d -name outputs -exec find {} -type f -print \; || true
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found: $APK"

      - name: Compute release tag
        id: tag
        run: |
          echo "tag=android-v0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=v0.0.${{ github.run_number }} (Android)" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Android debug APK (arm64). Install via "unknown sources".
            Auto-fill is desktop-only — on Android, Final Submit opens the
            Fillout form in your browser for manual entry.
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false

      # Delete every android-v* release EXCEPT the one we just published.
      # The old approach sorted by createdAt and dropped all-but-newest, but
      # right after publishing, the fresh release's createdAt isn't populated
      # yet in `gh release list` (replication lag) — it sorted first (null) and
      # got deleted as "not the newest", leaving the previous release behind.
      # Keying off the exact tag we published is immune to that ordering race.
      - name: Keep only the latest Android release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: ${{ steps.tag.outputs.tag }}
        run: |
          # Fail loudly if publish silently didn't create the release.
          gh release view "$KEEP" >/dev/null
          gh release list --json tagName --jq \
            '.[] | select(.tagName | startswith("android-v")) | .tagName' \
            | while read -r t; do
                if [ -n "$t" ] && [ "$t" != "$KEEP" ]; then
                  gh release delete "$t" --yes --cleanup-tag
                fi
              done
