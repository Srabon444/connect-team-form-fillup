name: Release Linux

# Fully automated: any push to this branch that touches desktop/ builds and
# publishes a new release, tagged with a run-number so it's always unique.
# After publishing, only the newest linux-v* release+tag is kept — older
# ones are deleted automatically.
on:
  push:
    branches: ["desktop-linux"]
    paths: ["desktop/**", ".github/workflows/release-linux.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Run tests
        working-directory: desktop
        run: npm test

      - name: Compute release tag
        id: tag
        # Tag stays prefixed (linux-v…) for uniqueness + the keep-latest
        # cleanup filter; the visible release NAME is plain semver.
        run: |
          echo "tag=linux-v0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=v0.0.${{ github.run_number }} (Linux)" >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.name }}
          releaseBody: "Linux build: .deb and .AppImage attached."
          releaseDraft: false
          prerelease: false

      - name: Keep only the latest Linux release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,createdAt --jq \
            '[.[] | select(.tagName | startswith("linux-v"))] | sort_by(.createdAt) | .[:-1][].tagName' \
            | while read -r old; do
                [ -n "$old" ] && gh release delete "$old" --yes --cleanup-tag
              done
