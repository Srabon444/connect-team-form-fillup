name: Release Windows

# Fully automated: any push to this branch that touches desktop/ builds and
# publishes a new release, tagged with a run-number so it's always unique.
# After publishing, only the newest windows-v* release+tag is kept — older
# ones are deleted automatically.
on:
  push:
    branches: ["desktop-windows"]
    paths: ["desktop/**", ".github/workflows/release-windows.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Run tests
        working-directory: desktop
        run: npm test

      - name: Compute release tag
        id: tag
        shell: bash
        run: echo "name=windows-v0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "Team Timesheet ${{ steps.tag.outputs.name }} (Windows)"
          releaseBody: "Windows build: .msi and NSIS .exe installers attached."
          releaseDraft: false
          prerelease: false

      - name: Keep only the latest Windows release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,createdAt --jq \
            '[.[] | select(.tagName | startswith("windows-v"))] | sort_by(.createdAt) | .[:-1][].tagName' \
            | while read -r old; do
                [ -n "$old" ] && gh release delete "$old" --yes --cleanup-tag
              done
