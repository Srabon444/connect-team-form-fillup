name: Release Windows

# Fully automated: any push to this branch that touches desktop/ builds and
# publishes a new release, tagged with a run-number so it's always unique.
# After publishing, only the newest windows-v* release+tag is kept — older
# ones are deleted automatically.
on:
  push:
    branches: ["desktop-windows"]
    paths: ["desktop/**", ".github/workflows/release-windows.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Run tests
        working-directory: desktop
        run: npm test

      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          echo "tag=windows-v0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=v0.0.${{ github.run_number }} (Windows)" >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.name }}
          releaseBody: "Windows build: .msi and NSIS .exe installers attached."
          releaseDraft: false
          prerelease: false

      # Keep exactly the tag we just published. The old createdAt sort
      # deleted the FRESH release when its createdAt hadn't populated yet in
      # `gh release list` (replication lag sorts it first, .[:-1] then picks
      # it). Keying off the published tag is immune to that race.
      - name: Keep only the latest Windows release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$KEEP" >/dev/null
          gh release list --json tagName --jq \
            '.[] | select(.tagName | startswith("windows-v")) | .tagName' \
            | while read -r t; do
                if [ -n "$t" ] && [ "$t" != "$KEEP" ]; then
                  gh release delete "$t" --yes --cleanup-tag
                fi
              done
